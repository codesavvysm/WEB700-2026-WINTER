<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Display: Grid</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; padding: 2rem; max-width: 700px; margin: 0 auto; }
    h1 { color: #333; }
    .grid-3col {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin: 1rem 0;
    }
    .grid-3col .cell {
      padding: 1rem;
      background: #a5d6a7;
      border: 1px solid #2e7d32;
      border-radius: 4px;
    }
    .grid-areas {
      display: grid;
      grid-template-columns: 1fr 2fr;
      grid-template-rows: auto 1fr auto;
      grid-template-areas:
        "header header"
        "sidebar main"
        "footer footer";
      gap: 8px;
      margin: 1rem 0;
      min-height: 200px;
    }
    .grid-areas .header { grid-area: header; background: #90caf9; padding: 10px; border-radius: 4px; }
    .grid-areas .sidebar { grid-area: sidebar; background: #ce93d8; padding: 10px; border-radius: 4px; }
    .grid-areas .main { grid-area: main; background: #fff59d; padding: 10px; border-radius: 4px; }
    .grid-areas .footer { grid-area: footer; background: #80cbc4; padding: 10px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>display: grid</h1>
  <p>CSS Grid lays out children in rows and columns. You define tracks (columns/rows) and optionally place items by line or named areas.</p>

  <h2>Simple 3-column grid</h2>
  <div class="grid-3col">
    <div class="cell">1</div>
    <div class="cell">2</div>
    <div class="cell">3</div>
    <div class="cell">4</div>
    <div class="cell">5</div>
    <div class="cell">6</div>
  </div>

  <h2>Grid with named areas (header, sidebar, main, footer)</h2>
  <div class="grid-areas">
    <div class="header">Header</div>
    <div class="sidebar">Sidebar</div>
    <div class="main">Main content</div>
    <div class="footer">Footer</div>
  </div>
</body>
</html>
